<svg width="240" height="72" viewBox="0 0 240 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="listenGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C8CFF"/>
      <stop offset="55%" stop-color="#9B7CF0"/>
      <stop offset="100%" stop-color="#FF6B5B"/>
    </linearGradient>
  </defs>

  <!-- Casque audio stylisé -->
  <path d="M14 40 V32 a20 20 0 0140 0 v8"
