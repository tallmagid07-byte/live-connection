  <rect x="9" y="38" width="10" height="16" rx="5" fill="url(#listenGradient)"/>
  <rect x="49" y="38" width="10" height="16" rx="5" fill="url(#listenGradient)"/>

  <!-- Barres de forme d'onde -->
  <g stroke="url(#listenGradient)" stroke-width="4" stroke-linecap="round">
    <line x1="74" y1="30" x2="74" y2="46"/>
    <line x1="84" y1="20" x2="84" y2="56"/>
    <line x1="94" y1="12" x2="94" y2="64"/>
    <line x1="104" y1="24" x2="104" y2="52"/>
    <line x1="114" y1="32" x2="114" y2="44"/>
  </g>

  <!-- Texte "Listen" -->
  <text x="128" y="50" font-family="Georgia, serif" font-style="italic" font-size="34" fill="#EDEAF6">
    Listen
  </text>

  <!-- Petit cœur, en clin d'œil au lien émotionnel -->
  <path d="M222 26c-2-4-8-3-8 2 0 4 8 9 8 9s8-5 8-9c0-5-6-6-8-2z" fill="#FF6B5B"/>
