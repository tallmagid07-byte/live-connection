<svg width="420" height="140" viewBox="0 0 420 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="listenGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C8CFF"/>
      <stop offset="50%" stop-color="#B07CE8"/>
      <stop offset="100%" stop-color="#FF6B5B"/>
    </linearGradient>
  </defs>

  <!-- Casque audio : arceau + oreillettes -->
  <path d="M40 78 V58 a48 48 0 0196 0 v20"
        fill="none" stroke="url(#listenGradient)" stroke-width="9" stroke-linecap="round"/>

  <g>
    <rect x="26" y="70" width="26" height="40" rx="13" fill="url(#listenGradient)"/>
    <rect x="32" y="78" width="14" height="24" rx="7" fill="#0B0F1A" opacity="0.35"/>
  </g>
  <g>
    <rect x="122" y="70" width="26" height="40" rx="13" fill="url(#listenGradient)"/>
    <rect x="128" y="78" width="14" height="24" rx="7" fill="#0B0F1A" opacity="0.35"/>
  </g>

  <!-- Texte "Listen" -->
  <text x="168" y="100" font-family="Georgia, serif" font-style="italic" font-weight="600" font-size="72" fill="#EDEAF6">
    Listen
  </text>

  <!-- Forme d'onde traversant le texte -->
  <g stroke="url(#listenGradient)" stroke-width="5" stroke-linecap="round" opacity="0.9">
    <line x1="238" y1="72" x2="238" y2="96"/>
    <line x1="250" y1="58" x2="250" y2="110"/>
    <line x1="262" y1="46" x2="262" y2="122"/>
    <line x1="274" y1="62" x2="274" y2="106"/>
    <line x1="286" y1="76" x2="286" y2="92"/>
  </g>

  <!-- Coeur -->
  <path d="M382 46c-4-8-16-6-16 4 0 8 16 18 16 18s16-10 16-18c0-10-12-12-16-4z" fill="#FF6B5B"/>
</svg>
