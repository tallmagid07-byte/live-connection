<svg width="300" height="88" viewBox="0 0 300 88" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C8CFF"/>
      <stop offset="100%" stop-color="#FF6B5B"/>
    </linearGradient>
  </defs>

  <!-- Marque : cercle fin + forme d'onde minimaliste, comme un bouton lecture -->
  <circle cx="34" cy="44" r="30" fill="none" stroke="url(#mark)" stroke-width="2"/>
  <g stroke="url(#mark)" stroke-width="3" stroke-linecap="round">
    <line x1="21" y1="36" x2="21" y2="52"/>
    <line x1="30" y1="28" x2="30" y2="60"/>
    <line x1="39" y1="34" x2="39" y2="54"/>
    <line x1="48" y1="40" x2="48" y2="48"/>
  </g>

  <!-- Wordmark -->
  <text x="82" y="55" font-family="Georgia, serif" font-style="italic" font-weight="600" font-size="38" letter-spacing="0.3" fill="#EDEAF6">
    Listen
  </text>
</svg>
